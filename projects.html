<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: #111827;
      position: sticky;
      top: 0;
      animation: slideDown 0.6s ease;
    }

    .navbar a {
      color: #94a3b8;
      text-decoration: none;
      margin-right: 15px;
    }

    .navbar a:hover {
      color: white;
    }

    .nav-links {
      display: flex;
    }

    /* CONTAINER */
    .container {
      padding: 60px 20px;
      text-align: center;
      animation: fadeIn 1s ease;
    }

    h1 {
      margin-bottom: 40px;
    }

    /* GRID */
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1100px;
      margin: auto;
    }

    /* CARD */
    .card {
      background: #1e293b;
      border-radius: 15px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.02);
      background: #334155;
    }

    /* IMAGE */
    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    /* CONTENT */
    .card-content {
      padding: 15px;
      text-align: left;
    }

    .card h3 {
      margin: 10px 0;
    }

    .card p {
      font-size: 14px;
      color: #cbd5f5;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      color: #38bdf8;
      text-decoration: none;
    }

    .card a:hover {
      text-decoration: underline;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }

  </style>
</head>

<body>

  <div class="navbar">
    <a href="index.html">← Home</a>

    <div class="nav-links">
      <a href="projects.html">Projects</a>
      <a href="social.html">Social</a>
    </div>
  </div>

  <div class="container">
    <h1>Meine Projekte</h1>

    <div class="projects">

      <!-- Projekt 1 -->
      <div class="card">
        <img src="images/project1.jpg" alt="Projekt 1">
        <div class="card-content">
          <h3>Mein Projekt</h3>
          <p>Beschreibung deines Projekts.</p>
          <a href="#">Mehr ansehen →</a>
        </div>
      </div>

      <!-- Projekt 2 -->
      <div class="card">
        <img src="images/project2.jpg" alt="Projekt 2">
        <div class="card-content">
          <h3>Website Projekt</h3>
          <p>Website mit HTML, CSS und JS.</p>
          <a href="#">Mehr ansehen →</a>
        </div>
      </div>

      <!-- Projekt 3 -->
      <div class="card">
        <img src="images/project3.jpg" alt="Projekt 3">
        <div class="card-content">
          <h3>Game Projekt</h3>
          <p>Kleines Spiel oder Experiment.</p>
          <a href="#">Mehr ansehen →</a>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
