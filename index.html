<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Meine persönliche Website über Technologie, Projekte und Tutorials.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>DevHub</title>

  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --text: #c9d1d9;
      --accent: #58a6ff;
    }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    header {
      padding: 20px;
      background: rgba(1,4,9,0.8);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      animation: slideDown 0.8s ease;
    }

    nav a {
      margin: 0 10px;
      color: var(--text);
      text-decoration: none;
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.3s;
    }

    nav a:hover::after { width: 100%; }

    .hero {
      text-align: center;
      padding: 120px 20px;
      background: radial-gradient(circle at top, #1f2937, #0d1117);
      animation: fadeIn 1.5s ease;
    }

    .hero h1 {
      font-size: 3em;
      animation: float 3s ease-in-out infinite;
    }

    .section {
      padding: 60px 20px;
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s ease;
    }

    .section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #010409;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);} 
      to { opacity: 1; transform: translateY(0);} 
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>

<header>
  <h2>🚀DevHub</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#downloads">Downloads</a>
    <a href="#videos">Videos</a>
    <a href="#bilder">Bilder</a>
    <a href="#community">Community</a>
    <div class="navbar-social">…</div>
  </nav>
</header>

<section class="hero">
  <h1>🚀 Mein DevHub</h1>
  <p>Tools, Tutorials, Downloads & Community</p>
</section>

<section id="downloads" class="section">
  <h2>📦 Downloads</h2>
  <div class="grid">
    <a href="files/StartSite.html" download>StartSite HTML Download</a>
    <div class="card">Tool 2 Download</div>
  </div>
</section>

<section id="videos" class="section">
  <h2>🎥 Videos</h2>
  <div class="grid">
    <div class="card">Video 1</div>
    <div class="card">Video 2</div>
  </div>
</section>

<section id="bilder" class="section">
  <h2>🖼 Bilder</h2>
  <div class="grid">
    <div class="card">Bild 1</div>
    <div class="card">Bild 2</div>
  </div>
</section>
<!-- Social Media Hub für Navbar -->
<div class="navbar-social">
    <a href="https://github.com/Winner0283Tech" target="_blank" title="GitHub">
        <i class="fab fa-github"></i>
    </a>
    <a href="https://www.reddit.com/user/Winner0283" target="_blank" title="Reddit">
        <i class="fab fa-reddit"></i>
    </a>
</div>

<style>
/* Mini Social Media Hub für Navbar */
.navbar-social {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-left: auto; /* schiebt die Icons nach rechts */
}

.navbar-social i {
    font-size: 20px;
    color: white; /* passe an deine Navbar-Farbe an */
    transition: transform 0.2s, color 0.2s;
}

.navbar-social i:hover {
    color: #0078d7;
    transform: scale(1.2);
}
</style>

<!-- Font Awesome (einmal im Head, falls noch nicht vorhanden) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<section id="community" class="section">
  <h2>💬 Community</h2>
  <p>Diskutiere mit anderen Entwicklern:</p>

  <script src="https://giscus.app/client.js"
        data-repo="Winner0283Tech/Winner0283Tech.github.io"
        data-repo-id="R_kgDORlSBLA"
        data-category="Q&A"
        data-category-id="DIC_kwDORlSBLM4C6cgt"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="dark"
        data-lang="de"
        crossorigin="anonymous"
        async>
</script>
</section>

<footer>
  <p>© 2026 DevHub</p>
</footer>

<script>
  // Scroll Animation
  const sections = document.querySelectorAll('.section');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.2 });

  sections.forEach(sec => observer.observe(sec));
</script>

</body>
</html>
