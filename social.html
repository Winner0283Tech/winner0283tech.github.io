<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Social</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      overflow-x: hidden;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: #111827;
      position: sticky;
      top: 0;
      z-index: 10;
      animation: slideDown 0.6s ease;
    }

    .navbar a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: white;
    }

    /* CONTAINER */
    .container {
      text-align: center;
      padding: 60px 20px;
      animation: fadeIn 1s ease;
    }

    h1 {
      margin-bottom: 40px;
      animation: fadeInUp 1s ease;
    }

    /* SOCIAL GRID */
    .socials {
      display: flex;
      gap: 25px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeInUp 1s ease;
    }

    .item a {
      width: 75px;
      height: 75px;
      background: #1e293b;
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 38px;
      color: white;
      text-decoration: none;
      transition: all 0.3s ease;
      transform: translateY(0);
    }

    .item a:hover {
      transform: translateY(-8px) scale(1.1);
    }

    .label {
      margin-top: 8px;
      font-size: 13px;
      color: #94a3b8;
      transition: 0.3s;
    }

    /* PLATFORM COLORS */
    .github a:hover {
      background: #24292e;
      color: white;
    }

    .reddit a:hover {
      background: #ff4500;
      color: white;
    }

    .devto a:hover {
      background: #0a0a0a;
      color: #00e5ff;
    }

    .stackoverflow a:hover {
      background: #f48024;
      color: white;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
      }
      to {
        transform: translateY(0);
      }
    }

    /* STAGGER EFFECT */
    .item:nth-child(1) { animation-delay: 0.1s; }
    .item:nth-child(2) { animation-delay: 0.2s; }
    .item:nth-child(3) { animation-delay: 0.3s; }
    .item:nth-child(4) { animation-delay: 0.4s; }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="index.html">← Home</a>
    <span>Social Links</span>
    <div></div>
  </div>

  <div class="container">
    <h1>Meine Socials</h1>

    <div class="socials">

      <!-- GitHub -->
      <div class="item github">
        <a href="https://github.com/Winner0283Tech" target="_blank">
          <i class="fa-brands fa-github"></i>
        </a>
        <div class="label">GitHub</div>
      </div>

      <!-- Reddit -->
      <div class="item reddit">
        <a href="https://www.reddit.com/user/winner0283" target="_blank">
          <i class="fa-brands fa-reddit-alien"></i>
        </a>
        <div class="label">Reddit</div>
      </div>

      <!-- dev.to -->
      <div class="item devto">
        <a href="https://dev.to/winner0283tech" target="_blank">
          <i class="fa-brands fa-dev"></i>
        </a>
        <div class="label">dev.to</div>
      </div>

      <!-- Stack Overflow -->
      <div class="item stackoverflow">
        <a href="https://stackoverflow.com/users/32605456/winner0283tech" target="_blank">
          <i class="fa-brands fa-stack-overflow"></i>
        </a>
        <div class="label">Stack Overflow</div>
      </div>

    </div>
  </div>

</body>
</html>
