<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Social Links</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    .socials {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .socials a {
      text-decoration: none;
      color: white;
      font-size: 40px;
      width: 70px;
      height: 70px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 15px;
      background: #1e293b;
      transition: 0.3s;
    }

    .socials a:hover {
      transform: scale(1.1);
      background: #334155;
    }

    .label {
      margin-top: 8px;
      font-size: 12px;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Meine Socials</h1>

    <div class="socials">

      <div class="item">
        <a href="https://github.com/Winner0283Tech" target="_blank">
          <i class="fa-brands fa-github"></i>
        </a>
        <div class="label">GitHub</div>
      </div>

      <div class="item">
        <a href="https://www.reddit.com/user/Winner0283" target="_blank">
          <i class="fa-brands fa-reddit-alien"></i>
        </a>
        <div class="label">Reddit</div>
      </div>

      <div class="item">
        <a href="https://dev.to/winner0283tech" target="_blank">
          <i class="fa-brands fa-dev"></i>
        </a>
        <div class="label">dev.to</div>
      </div>

      <div class="item">
        <a href="https://stackoverflow.com/users/32605456/winner0283tech" target="_blank">
          <i class="fa-brands fa-stack-overflow"></i>
        </a>
        <div class="label">Stack Overflow</div>
      </div>

    </div>
  </div>
</body>
</html>
